# Render Blueprint — https://render.com/docs/blueprint-spec
# Link this repo in Render → New Blueprint Instance, or create a Web Service manually with the same settings.

services:
  - type: web
    name: saathi-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Qdrant Cloud cluster HTTPS URL (include port if shown, e.g. ...cloud.qdrant.io:6333).
      - key: QDRANT_URL
        sync: false
      # Database API key from Qdrant Cloud → Cluster → API Keys (header api-key).
      - key: QDRANT_API_KEY
        sync: false
      # Google AI Studio API key for Gemini extraction.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      # Vapi Web SDK (injected into /ui/ HTML — public key only; keep private key off the client).
      - key: VAPI_PUBLIC_KEY
        sync: false
      - key: VAPI_ASSISTANT_ID
        sync: false
